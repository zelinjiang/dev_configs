# Show directory + conda env on the first line, symbol on the second
add_newline = true

format = """
$hostname
dir: $directory$conda$git_branch$git_status
$character
"""

[directory]
# Bold white directory name
style = "bold white"

# Conda environment: "đź…’ d2l-zh" in a nice warm yellow
[conda]
symbol = "đź…’ "
style = "bold fg:#ffd75f"         # warm, high-contrast yellow
format = " [$symbol$environment]($style)"
ignore_base = false


[git_branch]
symbol = "î‚  "
style = "bold fg:#87afff"
format = " [$symbol$branch]($style)"

[git_status]
style = "bold fg:#ffaf5f"
format = " [$all_status$ahead_behind]($style)"


# Prompt symbol: bright magenta âťŻ for success, red âťŻ on error
[character]
success_symbol = "[âťŻ](bold green)"    # Other choices: "$", "âťŻ", "âžś", "â€ş"
error_symbol   = "[âťŻ](bold red)"
format = "$symbol "

# Optional: hide the Python "îśĽ" icon if you don't want it
[python]
disabled = true


[hostname]
ssh_only = true
format = "[$hostname]($style) "
style = "dimmed"


[kubernetes]
disabled = false
format = "[$context( $namespace)]($style) "
contexts = [
  { context_pattern = ".*", style = "bold blue" }
]

